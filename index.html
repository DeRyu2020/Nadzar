<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadzar Photowork - Cloud System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; scroll-behavior: smooth; }
        .admin-field { display: none; }
        .is-admin .admin-field { display: table-cell; }
        .is-admin #badgeMode { background-color: #EF4444 !important; color: white !important; }
    </style>
</head>
<body id="mainBody" class="bg-[#F8FAFC] dark:bg-gray-900 text-gray-800 dark:text-gray-100 overflow-x-hidden text-sm">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 dark:bg-gray-900/90 flex items-center justify-center hidden text-center">
        <div>
            <div class="animate-spin text-4xl mb-2 text-blue-600 inline-block">🔄</div>
            <p class="font-bold text-[10px] uppercase tracking-widest text-blue-600">Sinkronisasi Cloud...</p>
        </div>
    </div>

    <div id="selectionScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-blue-600 dark:bg-blue-900 text-center">
        <div class="p-8">
            <h1 class="text-5xl font-extrabold mb-2 italic tracking-tight text-white uppercase">Nadzar</h1>
            <p class="mb-10 opacity-70 tracking-[0.3em] uppercase text-[10px] font-bold text-white">Automated Cloud System</p>
            <div class="flex flex-col md:flex-row gap-6">
                <button onclick="openApp('Pribadi')" class="group bg-white text-blue-600 px-10 py-8 rounded-[2.5rem] shadow-2xl hover:scale-105 transition-all">
                    <div class="text-4xl mb-2">👤</div>
                    <div class="text-xl font-bold uppercase tracking-widest">Input Klien</div>
                </button>
                <button onclick="openApp('Vendor')" class="group bg-blue-500 text-white px-10 py-8 rounded-[2.5rem] shadow-2xl hover:scale-105 border-2 border-blue-400 transition-all">
                    <div class="text-4xl mb-2">💄</div>
                    <div class="text-xl font-bold uppercase tracking-widest">Input MUA</div>
                </button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-all duration-700 container mx-auto p-4 md:p-10 max-w-7xl">
        <div class="flex justify-between items-start mb-10">
            <div>
                <div id="badgeMode" class="bg-blue-100 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block italic border border-blue-200">AKSES: MEMUAT...</div>
                <h1 class="text-4xl font-extrabold text-[#2563EB]">Nadzar Photowork</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdmin()" id="btnLock" title="Akses Admin" class="w-12 h-12 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md border border-gray-100 text-xl hover:bg-yellow-50">🔓</button>
                <button id="themeToggle" class="w-12 h-12 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md">🌙</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-700 h-fit">
                <h2 id="formTitle" class="text-2xl font-bold mb-2 italic tracking-tight text-blue-600 uppercase">ISI DATA</h2>
                
                <div class="bg-blue-50 dark:bg-blue-900/30 border-l-4 border-blue-500 p-4 mb-6 rounded-r-xl">
                    <p class="text-[11px] leading-relaxed font-semibold text-blue-800 dark:text-blue-200">
                        Harap melihat dulu <a href="#tabelBagian" class="underline decoration-2 decoration-blue-400 font-bold text-blue-600 dark:text-blue-400">agenda dibawah</a>, atau cek Agenda via 
                        <a href="https://wa.me/6289685356850" target="_blank" class="underline decoration-2 decoration-green-400 font-bold text-green-600 dark:text-green-400">Whatsapp Nadzar</a>
                    </p>
                </div>

                <div class="space-y-4">
                    <input type="hidden" id="editId">
                    <label id="labelNama" class="text-[10px] font-bold uppercase ml-2 opacity-50">Nama Utama</label>
                    <input type="text" id="inputNama" class="w-full p-4 mt-1 mb-4 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none font-bold shadow-sm">
                    
                    <div id="containerNamaKlien" class="hidden">
                        <label class="text-[10px] font-bold uppercase ml-2 opacity-50 text-purple-600">Nama User / Klien MUA</label>
                        <input type="text" id="inputNamaKlien" class="w-full p-4 mt-1 mb-4 rounded-xl border border-purple-100 dark:bg-gray-700 outline-none font-bold shadow-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-2 text-xs font-bold mb-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase ml-2 opacity-50">Paket</label>
                            <select id="inputKategori" class="w-full p-4 mt-1 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none shadow-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase ml-2 opacity-50">Tanggal</label>
                            <input type="date" id="inputTanggal" class="w-full p-4 mt-1 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none shadow-sm">
                        </div>
                    </div>

                    <input type="text" id="inputKontak" placeholder="WhatsApp (08...)" class="w-full p-4 mb-4 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none shadow-sm">
                    <input type="text" id="inputLokasi" placeholder="Lokasi Acara" class="w-full p-4 mb-4 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none shadow-sm">
                    <textarea id="inputAlamat" placeholder="Alamat Lengkap / Catatan" rows="2" class="w-full p-4 rounded-xl border border-gray-100 dark:bg-gray-700 outline-none shadow-sm"></textarea>
                    
                    <button onclick="simpanData()" id="btnSimpan" class="w-full bg-[#2563EB] text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition uppercase text-[10px] tracking-widest shadow-lg">Simpan & Kirim</button>
                    <button onclick="cancelEdit()" id="btnCancelEdit" class="hidden w-full text-gray-400 font-bold py-2 text-[10px] uppercase">Batal Ubah</button>
                </div>
            </div>

            <div id="tabelBagian" class="lg:col-span-8 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b pb-6 dark:border-gray-700">
                    <h2 class="text-2xl font-bold italic tracking-tight text-blue-600 uppercase">Agenda Nadzar</h2>
                    
                    <div id="adminControls" class="hidden flex flex-wrap gap-2 justify-center">
                        <div class="relative w-full md:w-auto mb-2 md:mb-0">
                            <input type="text" id="searchBar" onkeyup="muatTabel()" placeholder="Cari nama/lokasi..." class="w-full md:w-64 p-3 pl-10 rounded-xl border border-gray-200 dark:bg-gray-700 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            <span class="absolute left-3 top-3 opacity-30">🔍</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 justify-center">
                            <button onclick="tarikDataCloud()" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm hover:bg-orange-200 transition">Tarik Cloud ☁️</button>
                            <button onclick="sinkronSpreadsheet()" id="syncBtn" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm hover:bg-blue-200 transition">Update Cloud 🚀</button>
                            <button onclick="eksporExcel()" class="bg-green-100 text-green-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-sm hover:bg-green-200 transition">Excel 📥</button>
                        </div>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse" id="tabelUtama">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-100 dark:border-gray-700 text-[9px] uppercase font-bold tracking-widest">
                                <th class="pb-4 pr-2">Tgl</th>
                                <th class="pb-4 pr-2">Agenda</th>
                                <th class="pb-4 pr-2">Paket</th>
                                <th class="pb-4 admin-field text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="isiTabel" class="divide-y divide-gray-50 dark:divide-gray-700 text-xs"></tbody>
                    </table>
                    <div id="emptyState" class="py-20 text-center opacity-20 italic font-bold text-[10px] tracking-[0.3em] uppercase">Data Kosong / Tidak Ditemukan</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwQbnJoZuF9CaOP6ul2eee_J-TCt04dLI6CFLcpNvTSOO73z8sgGpVhwvCyrjYGBX5L-g/exec";
        
        let currentMode = "";
        let isAdmin = false;
        let dataSimpanan = [];

        try {
            const localData = localStorage.getItem('nadzarData');
            dataSimpanan = localData ? JSON.parse(localData) : [];
        } catch (e) { dataSimpanan = []; }

        async function openApp(mode) {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.remove('hidden');
            try {
                const response = await fetch(URL_SCRIPT + '?t=' + Date.now());
                const cloudData = await response.json();
                if(cloudData && Array.isArray(cloudData)) {
                    dataSimpanan = cloudData;
                    localStorage.setItem('nadzarData', JSON.stringify(dataSimpanan));
                }
            } catch (e) { console.warn("Pakai data lokal."); }

            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            setTimeout(() => document.getElementById('mainContent').classList.add('opacity-100'), 50);

            currentMode = mode;
            updateBadge();
            aturPilihanPaket(mode);
            try { muatTabel(); } catch(e) {}
            loading.classList.add('hidden');
        }

        function aturPilihanPaket(mode) {
            const select = document.getElementById('inputKategori');
            const containerNamaKlien = document.getElementById('containerNamaKlien');
            if(mode === 'Vendor') {
                document.getElementById('labelNama').innerText = "Nama MUA / Salon";
                containerNamaKlien.classList.remove('hidden');
                select.innerHTML = `<option value="Wedding">💍 Wedding</option><option value="Engagement">🎀 Engagement</option><option value="Makeup Only">💄 Makeup Only</option>`;
            } else {
                document.getElementById('labelNama').innerText = "Nama Calon Pengantin";
                containerNamaKlien.classList.add('hidden');
                select.innerHTML = `<option value="Wedding">💍 Wedding</option><option value="Pre-Wed">📸 Pre-Wed</option><option value="Product">📦 Product</option><option value="Portrait">👤 Portrait</option>`;
            }
        }

        function formatTanggalIndo(tglString) {
            if(!tglString) return "-";
            const d = new Date(tglString);
            if(isNaN(d.getTime())) return tglString;
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
        }

        function formatWA(no) {
            if(!no) return "";
            let cleaned = no.toString().trim();
            if(cleaned.startsWith('8')) return '0' + cleaned;
            return cleaned;
        }

        function muatTabel() {
            const tabel = document.getElementById('isiTabel');
            const keyword = document.getElementById('searchBar').value.toLowerCase();
            if(!tabel) return;
            tabel.innerHTML = '';
            
            const dataValid = Array.isArray(dataSimpanan) ? dataSimpanan : [];
            
            // FILTER BERDASARKAN KEYWORD PENCARIAN
            const filtered = dataValid.filter(d => {
                const searchString = `${d.nama} ${d.namaKlien} ${d.lokasi} ${d.kat}`.toLowerCase();
                return searchString.includes(keyword);
            });

            const sorted = filtered.sort((a,b) => (new Date(a.tgl || 0)) - (new Date(b.tgl || 0)));

            document.getElementById('emptyState').classList.toggle('hidden', sorted.length > 0);

            sorted.forEach(d => {
                const fTgl = formatTanggalIndo(d.tgl);
                const isVendor = d.tipe === 'Vendor';
                let infoNama = `<div class="font-bold text-gray-800 dark:text-gray-100 uppercase">${d.nama || 'No Name'}</div>`;
                if(isVendor && d.namaKlien && d.namaKlien !== "-") {
                    infoNama = `<div class="text-purple-600 dark:text-purple-400 font-extrabold uppercase text-[11px]">${d.namaKlien}</div>
                                <div class="text-[8px] opacity-50 font-bold uppercase">MUA: ${d.nama}</div>`;
                }

                let row = `<tr class="border-b border-gray-50 dark:border-gray-800">
                    <td class="py-4 pr-2 font-black text-blue-600 uppercase text-[9px] whitespace-nowrap">${fTgl}</td>
                    <td class="py-4 pr-2">${infoNama}</td>
                    <td class="py-4 pr-2"><span class="bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-[8px] font-bold uppercase">${d.kat || '-'}</span></td>`;
                
                if(isAdmin) {
                    const noWA = formatWA(d.wa);
                    const waLink = noWA.startsWith('0') ? '62' + noWA.substring(1) : noWA;
                    row += `<td class="py-4 text-center">
                        <div class="flex gap-1 justify-center">
                            <a href="https://wa.me/${waLink}" target="_blank" class="bg-green-500 p-2 rounded-lg text-white">📱</a>
                            <button onclick="editData(${d.id})" class="bg-blue-500 p-2 rounded-lg text-white">✏️</button>
                            <button onclick="hapusData(${d.id})" class="bg-red-500 p-2 rounded-lg text-white">🗑️</button>
                        </div>
                    </td>`;
                }
                row += `</tr>`;
                tabel.insertAdjacentHTML('beforeend', row);
            });
        }

        async function tarikDataCloud() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.remove('hidden');
            try {
                const response = await fetch(URL_SCRIPT + '?t=' + Date.now());
                const cloudData = await response.json();
                if(cloudData && Array.isArray(cloudData)) {
                    dataSimpanan = cloudData;
                    localStorage.setItem('nadzarData', JSON.stringify(dataSimpanan));
                    muatTabel();
                    loading.classList.add('hidden');
                    setTimeout(() => alert("✅ Sinkron Berhasil!"), 50);
                }
            } catch (e) {
                loading.classList.add('hidden');
                alert("❌ Gagal Sinkron!");
            }
        }

        function updateBadge() {
            const badge = document.getElementById('badgeMode');
            if(!badge) return;
            if(isAdmin) {
                badge.innerText = "AKSES: ADMIN";
                badge.className = "bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block italic";
            } else {
                badge.innerText = "AKSES: " + currentMode;
                badge.className = "bg-blue-100 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block italic border border-blue-200";
            }
        }

        function toggleAdmin() {
            if(!isAdmin) {
                const pass = prompt("Password Admin:");
                if(pass === "123456") {
                    isAdmin = true;
                    document.getElementById('mainBody').classList.add('is-admin');
                    document.getElementById('adminControls').classList.remove('hidden');
                    document.getElementById('btnLock').innerText = "🔒";
                    updateBadge();
                    muatTabel();
                } else if(pass !== null) { alert("Akses Ditolak!"); }
            } else {
                isAdmin = false;
                document.getElementById('mainBody').classList.remove('is-admin');
                document.getElementById('adminControls').classList.add('hidden');
                document.getElementById('btnLock').innerText = "🔓";
                updateBadge();
                muatTabel();
            }
        }

        async function simpanData() {
            const val = (id) => document.getElementById(id).value;
            if(!val('inputNama') || !val('inputTanggal')) return alert("Isi Nama & Tanggal!");
            
            const loading = document.getElementById('loadingOverlay');
            loading.classList.remove('hidden');

            const obj = {
                id: document.getElementById('editId').value || Date.now(),
                tipe: currentMode || 'Pribadi', 
                nama: val('inputNama'),
                namaKlien: currentMode === 'Vendor' ? val('inputNamaKlien') : "-",
                kat: val('inputKategori'), 
                tgl: val('inputTanggal'),
                wa: formatWA(val('inputKontak')),
                lokasi: val('inputLokasi'), 
                alamat: val('inputAlamat')
            };

            const idx = dataSimpanan.findIndex(i => i.id == obj.id);
            if(idx > -1) dataSimpanan[idx] = obj;
            else dataSimpanan.push(obj);

            try {
                await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
                localStorage.setItem('nadzarData', JSON.stringify(dataSimpanan));
                alert("✅ Data Terkirim!");
                cancelEdit();
                muatTabel();
            } catch (e) { alert("⚠️ Simpan Lokal!"); }
            finally { loading.classList.add('hidden'); }
        }

        async function sinkronSpreadsheet() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.remove('hidden');
            try {
                await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
                alert("✅ Cloud Diupdate!");
            } catch (e) { alert("❌ Gagal Sinkron!"); }
            finally { loading.classList.add('hidden'); }
        }

        function editData(id) {
            const item = dataSimpanan.find(i => i.id == id);
            if(!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('inputNama').value = item.nama || '';
            document.getElementById('inputTanggal').value = item.tgl || '';
            document.getElementById('inputKontak').value = item.wa || '';
            document.getElementById('inputLokasi').value = item.lokasi || '';
            document.getElementById('inputAlamat').value = item.alamat || '';
            document.getElementById('inputKategori').value = item.kat || '';
            if(item.tipe === 'Vendor') {
                document.getElementById('containerNamaKlien').classList.remove('hidden');
                document.getElementById('inputNamaKlien').value = item.namaKlien || '';
            }
            document.getElementById('btnSimpan').innerText = "Update Data";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('editId').value = '';
            document.getElementById('btnSimpan').innerText = "Simpan & Kirim";
            ['inputNama', 'inputNamaKlien', 'inputTanggal', 'inputKontak', 'inputLokasi', 'inputAlamat'].forEach(i => document.getElementById(i).value = '');
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        function hapusData(id) {
            if(confirm("Hapus agenda?")) {
                dataSimpanan = dataSimpanan.filter(i => i.id != id);
                localStorage.setItem('nadzarData', JSON.stringify(dataSimpanan));
                muatTabel();
            }
        }

        function eksporExcel() {
            const ws = XLSX.utils.json_to_sheet(dataSimpanan);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Agenda");
            XLSX.writeFile(wb, "Agenda_Nadzar.xlsx");
        }

        document.getElementById('themeToggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
        };
    </script>
</body>
</html>
