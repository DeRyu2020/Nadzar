<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadzar Photowork - Cloud v4.5.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        .loader-ring { border: 3px solid rgba(37, 99, 235, 0.1); border-top: 3px solid #2563EB; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .glass-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .today-highlight { border: 2px solid #2563EB !important; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.2); position: relative; background: rgba(37, 99, 235, 0.03) !important; }
        .dark .today-highlight { background: rgba(37, 99, 235, 0.1) !important; }
    </style>
</head>
<body id="mainBody" class="bg-[#F8FAFC] dark:bg-gray-900 text-gray-800 dark:text-gray-100 text-sm">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/95 dark:bg-gray-900/95 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="loader-ring"></div>
    </div>

    <div id="selectionScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-blue-600 text-center px-6 text-white">
        <div class="max-w-md w-full">
            <h1 class="text-5xl font-extrabold mb-2 italic uppercase tracking-tighter">Nadzar</h1>
            <p class="mb-10 opacity-70 tracking-[0.3em] uppercase text-[10px] font-bold">Automated Cloud System</p>
            <div class="flex flex-col gap-4">
                <button onclick="openApp('Pribadi')" class="bg-white text-blue-600 p-6 rounded-[2rem] font-black uppercase tracking-widest hover:scale-105 transition shadow-2xl">👤 Input Klien</button>
                <button onclick="openApp('Vendor')" class="bg-blue-500 text-white p-6 rounded-[2rem] border-2 border-blue-400 font-black uppercase tracking-widest hover:scale-105 transition shadow-2xl">💄 Input MUA</button>
            </div>
            <p class="mt-8 text-[9px] opacity-50 font-bold uppercase tracking-widest">NADZAR PHOTOWORK © 2026</p>
        </div>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-all duration-700 container mx-auto p-4 md:p-10 max-w-7xl">
        <div class="flex justify-between items-start mb-8">
            <div>
                <div id="badgeMode" class="bg-blue-100 text-blue-600 text-[9px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block tracking-widest">LOADING...</div>
                <h1 class="text-3xl font-extrabold text-[#2563EB] tracking-tighter">Nadzar Photowork</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdmin()" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md text-lg hover:scale-110 transition">🔓</button>
                <button id="themeToggle" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md hover:scale-110 transition">🌙</button>
            </div>
        </div>

        <div class="admin-only mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden flex flex-col md:flex-row gap-6 min-h-[340px]">
                    <div class="flex-1 z-10">
                        <h3 class="text-[9px] font-black uppercase tracking-[0.3em] text-blue-200 mb-6 flex items-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-ping"></span> AGENDA HARI INI
                        </h3>
                        <div id="agendaHariIniList" class="space-y-4 overflow-y-auto max-h-[220px] custom-scroll pr-4"></div>
                    </div>
                    <div class="w-full md:w-72 glass-box rounded-[1.5rem] p-6 z-10">
                        <h3 class="text-[8px] font-black uppercase tracking-widest text-blue-300 mb-4">JADWAL SELANJUTNYA</h3>
                        <div id="nextList" class="space-y-4 overflow-y-auto max-h-[200px] custom-scroll pr-2"></div>
                    </div>
                </div>
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 flex flex-col justify-center text-center">
                    <h3 class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-gray-400 mb-6">SUMMARY JOB BULAN INI</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="border-r dark:border-gray-700">
                            <div id="statTotal" class="text-5xl font-black text-blue-600">0</div>
                            <div class="text-[9px] font-bold text-blue-400 uppercase mt-2 tracking-widest">TOTAL</div>
                        </div>
                        <div>
                            <div id="statVendor" class="text-5xl font-black text-purple-600">0</div>
                            <div class="text-[9px] font-bold text-purple-400 uppercase mt-2 tracking-widest">VENDOR</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-6 border-b border-gray-200 dark:border-gray-700 flex gap-6">
            <button onclick="switchTab('agenda')" id="tab-agenda" class="border-b-2 border-blue-600 pb-2 text-[10px] font-black uppercase tracking-widest">📅 Agenda</button>
            <button onclick="switchTab('paket')" id="tab-paket" class="hidden pb-2 text-[10px] font-black uppercase tracking-widest opacity-40">🏷️ Paket</button>
        </div>

        <div id="section-agenda">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div id="formContainer" class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 h-fit">
                    <h2 id="formTitle" class="text-xl font-black mb-6 text-blue-600 uppercase italic">Input Data</h2>
                    <div class="space-y-4">
                        <input type="hidden" id="editId">
                        <div>
                            <label id="labelVendor" class="hidden text-[10px] font-bold text-purple-600 uppercase ml-2 mb-1 tracking-widest">Nama Vendor</label>
                            <input type="text" id="inputNama" placeholder="Nama" class="w-full p-4 rounded-2xl border dark:bg-gray-700 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div id="containerNamaKlien" class="hidden">
                            <input type="text" id="inputNamaKlien" placeholder="Nama Klien" class="w-full p-4 rounded-2xl border border-purple-100 dark:bg-gray-700 font-bold italic outline-none focus:ring-2 focus:ring-purple-400">
                        </div>
                        <div class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="inputKategori" onchange="autoFillHarga()" class="p-4 rounded-2xl border dark:bg-gray-700 font-bold outline-none"></select>
                                <input type="date" id="inputTanggal" class="p-4 rounded-2xl border dark:bg-gray-700 outline-none font-bold">
                            </div>
                            <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-800 flex justify-between items-center px-4">
                                <span class="text-[9px] font-bold opacity-50 uppercase">Estimasi Harga:</span>
                                <span id="textHargaDisplay" class="text-xs font-black text-blue-600 dark:text-blue-400 italic">Rp 0</span>
                            </div>
                        </div>
                        <div class="admin-only"><input type="number" id="inputHarga" placeholder="Harga IDR" class="w-full p-4 rounded-2xl border border-green-100 dark:bg-gray-700 font-bold"></div>
                        <input type="text" id="inputJam" placeholder="Jam (Contoh: 08.00 - Selesai)" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <input type="text" id="inputKontak" placeholder="WhatsApp (08xx)" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <input type="text" id="inputLokasi" placeholder="Lokasi Acara" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <textarea id="inputAlamat" placeholder="Alamat Lengkap" class="w-full p-4 rounded-2xl border dark:bg-gray-700 h-20"></textarea>
                        <div id="fieldRekanan" class="admin-only"><input type="text" id="inputRekanan" placeholder="Handler Fotografer" class="w-full p-4 rounded-2xl border border-orange-100 dark:bg-gray-700 font-bold uppercase text-xs"></div>
                        <div class="pt-2 flex flex-col gap-2">
                            <button onclick="simpanData()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-lg transition active:scale-95">Simpan Agenda</button>
                            <button id="btnBatal" onclick="bersihkanForm()" class="hidden w-full bg-red-50 text-red-600 font-bold py-3 rounded-2xl uppercase text-[9px]">Batal</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 min-h-[500px] flex flex-col">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <h2 class="text-xl font-black text-blue-600 uppercase italic tracking-tighter">Daftar Agenda</h2>
                        
                        <div class="flex flex-wrap items-center gap-2 admin-only">
                            <select id="showEntries" onchange="resetHalamanDanCari()" class="bg-blue-50 dark:bg-blue-900/30 px-3 py-2.5 rounded-xl text-[10px] font-black uppercase text-blue-600 outline-none border-none">
                                <option value="5">Tampil 5</option>
                                <option value="10">Tampil 10</option>
                                <option value="25">Tampil 25</option>
                                <option value="50">Tampil 50</option>
                                <option value="all">Semua</option>
                            </select>

                            <select id="filterTahun" onchange="resetHalamanDanCari()" class="bg-gray-50 dark:bg-gray-700 px-3 py-2.5 rounded-xl text-[10px] font-black uppercase outline-none border-none">
                                <option value="all">Tahun</option>
                                <option value="2025">2025</option><option value="2026">2026</option><option value="2027">2027</option>
                                <option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option>
                            </select>
                            
                            <select id="filterBulan" onchange="resetHalamanDanCari()" class="bg-gray-50 dark:bg-gray-700 px-3 py-2.5 rounded-xl text-[10px] font-black uppercase outline-none border-none">
                                <option value="all">Bulan</option>
                                <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                                <option value="04">Apr</option><option value="05">Mei</option><option value="06">Jun</option>
                                <option value="07">Jul</option><option value="08">Agt</option><option value="09">Sep</option>
                                <option value="10">Okt</option><option value="11">Nov</option><option value="12">Des</option>
                            </select>
                            
                            <div class="relative w-full md:w-32">
                                <input type="text" id="searchInput" onkeyup="resetHalamanDanCari()" placeholder="Cari..." class="w-full pl-8 pr-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-700 border-none text-[11px] font-bold outline-none">
                                <span class="absolute left-3 top-2.5 opacity-30 text-xs">🔍</span>
                            </div>
                        </div>
                    </div>

                    <div id="isiTabel" class="space-y-3 flex-1"></div>

                    <div id="paginationContainer" class="mt-8 flex items-center justify-between pt-6 border-t dark:border-gray-700">
                        <div class="text-[10px] font-bold opacity-40 uppercase tracking-widest" id="pageInfo">Halaman 1 dari 1</div>
                        <div class="flex gap-2">
                            <button id="btnPrev" onclick="ubahHalaman(-1)" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 rounded-xl text-[10px] font-black uppercase disabled:opacity-30">Prev</button>
                            <button id="btnNext" onclick="ubahHalaman(1)" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase disabled:opacity-30">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-paket" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] border border-blue-100 h-fit">
                    <h2 class="text-xl font-black text-blue-600 uppercase italic">Master Paket</h2>
                    <div class="space-y-4 mt-6">
                        <input type="hidden" id="editIdPaket">
                        <input type="text" id="p_nama" placeholder="Nama Paket" class="w-full p-4 rounded-2xl border dark:bg-gray-700 font-bold">
                        <input type="number" id="p_harga" placeholder="Harga IDR" class="w-full p-4 rounded-2xl border dark:bg-gray-700 font-bold">
                        <textarea id="p_desc" placeholder="Keterangan..." class="w-full p-4 rounded-2xl border dark:bg-gray-700"></textarea>
                        <button onclick="simpanPaket()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-lg">Simpan Paket</button>
                    </div>
                </div>
                <div class="lg:col-span-8 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700">
                    <table class="w-full text-[10px] font-bold uppercase">
                        <thead><tr class="opacity-30 border-b dark:border-gray-700"><th class="pb-4 text-left px-4">Paket</th><th class="pb-4 text-right px-4">Harga</th><th class="pb-4 text-center px-4">Aksi</th></tr></thead>
                        <tbody id="isiTabelPaket"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyUQB4oF5LRpn2iC3kvCZlZk4yy0u5LjbyRBGmy5ldt4wRI1n87zybB3ut_LlEEGhJKXA/exec";
        let currentMode = "", isAdmin = false, dataSimpanan = [], dataPaket = [];
        let currentPage = 1, filteredData = [];

        // Auto filter bulan & tahun sekarang
        function autoSetFilter() {
            const now = new Date();
            document.getElementById('filterTahun').value = now.getFullYear();
            document.getElementById('filterBulan').value = ("0" + (now.getMonth() + 1)).slice(-2);
        }

        async function openApp(mode) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            autoSetFilter();
            setAppMode(mode);
            try { await Promise.all([tarikDataCloud(), tarikPaketCloud()]); } catch (e) { }
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            setTimeout(() => document.getElementById('mainContent').classList.add('opacity-100'), 50);
            updateBadge();
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function setAppMode(mode) {
            currentMode = mode;
            const isVendor = (mode === 'Vendor');
            document.getElementById('containerNamaKlien').classList.toggle('hidden', !isVendor);
            document.getElementById('labelVendor').classList.toggle('hidden', !isVendor);
            updateBadge();
        }

        async function tarikDataCloud() {
            try {
                const res = await fetch(URL_SCRIPT + "?sheet=Agenda&t=" + Date.now());
                dataSimpanan = await res.json();
                cariAgenda();
                updateHighlights();
            } catch (e) { }
        }

        async function tarikPaketCloud() {
            try {
                const res = await fetch(URL_SCRIPT + "?sheet=Paket&t=" + Date.now());
                dataPaket = await res.json();
                aturPilihanPaket();
                renderTabelPaket();
            } catch (e) { }
        }

        function resetHalamanDanCari() {
            currentPage = 1;
            cariAgenda();
        }

        function cariAgenda() { 
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const bulanVal = document.getElementById('filterBulan').value;
            const tahunVal = document.getElementById('filterTahun').value;
            let data = dataSimpanan;

            if(isAdmin) {
                data = data.filter(d => 
                    (d.nama||"").toLowerCase().includes(searchVal) || 
                    (d.namaKlien||"").toLowerCase().includes(searchVal) || 
                    (d.lokasi||"").toLowerCase().includes(searchVal)
                );
                if(bulanVal !== "all") data = data.filter(d => d.tgl && d.tgl.split('-')[1] === bulanVal);
                if(tahunVal !== "all") data = data.filter(d => d.tgl && d.tgl.split('-')[0] === tahunVal);
            }
            
            // SMART SORT UNTUK TAMPILAN
            filteredData = data.sort((a,b) => new Date(a.tgl || 0) - new Date(b.tgl || 0));
            muatTabelHalaman(); 
        }

        function muatTabelHalaman() {
            const limitVal = document.getElementById('showEntries').value;
            const limit = limitVal === 'all' ? filteredData.length : parseInt(limitVal);
            const totalPage = Math.ceil(filteredData.length / limit) || 1;
            const todayStr = new Date().toISOString().split('T')[0];
            
            if(currentPage > totalPage) currentPage = totalPage;
            const start = (currentPage - 1) * limit;
            const pagedData = filteredData.slice(start, start + limit);

            const container = document.getElementById('isiTabel');
            container.innerHTML = '';
            
            if(pagedData.length === 0) {
                container.innerHTML = '<div class="text-center py-10 opacity-30 font-bold uppercase text-[10px] tracking-widest italic">Tidak ada agenda ditemukan</div>';
            } else {
                pagedData.forEach(d => {
                    const isToday = d.tgl === todayStr;
                    const waLink = d.wa ? `https://wa.me/${d.wa.replace(/^0/, '62')}` : '#';
                    const cardClass = isToday ? 'today-highlight' : '';
                    const todayBadge = isToday ? `<div class="absolute -top-3 -right-2 bg-blue-600 text-white text-[7px] font-black px-2 py-1 rounded-lg animate-bounce shadow-lg uppercase tracking-tighter z-10">Hari Ini 🔥</div>` : '';

                    const content = isAdmin ? `
                        <div class="md:col-span-5 relative">
                            ${todayBadge}
                            <div class="text-[9px] font-black ${isToday ? 'text-blue-600' : 'text-gray-400'} mb-1 uppercase tracking-tighter">${formatTanggalIndo(d.tgl)} | ${d.jam || '-'}</div>
                            <div class="text-base font-black uppercase text-gray-800 dark:text-white leading-tight">${d.tipe === 'Vendor' ? d.namaKlien : d.nama}</div>
                            <div class="text-[10px] font-bold text-purple-600 dark:text-purple-400 uppercase mt-1 italic">${d.tipe === 'Vendor' ? '💄 ' + d.nama : '👤 Personal'}</div>
                        </div>
                        <div class="md:col-span-4 border-l border-gray-200 dark:border-gray-700 pl-4 md:block hidden">
                            <span class="text-[10px] bg-green-500/10 text-green-600 px-2.5 py-1 rounded-lg font-black italic block w-fit mb-1">💰 Rp ${parseInt(d.harga || 0).toLocaleString()}</span>
                            <span class="text-[10px] bg-orange-500/10 text-orange-600 px-2.5 py-1 rounded-lg font-black italic uppercase w-fit">📸 ${d.rekanan || '-'}</span>
                        </div>
                        <div class="md:col-span-3 flex justify-end gap-2">
                            <a href="${waLink}" target="_blank" class="w-9 h-9 flex items-center justify-center bg-green-100 text-green-600 rounded-full hover:scale-110 shadow-sm transition">📞</a>
                            <button onclick="editData(${d.id})" class="w-9 h-9 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full hover:scale-110 shadow-sm transition">✏️</button>
                            <button onclick="hapusData(${d.id})" class="w-9 h-9 flex items-center justify-center bg-red-50 text-red-600 rounded-full hover:scale-110 shadow-sm transition">🗑️</button>
                        </div>` : `
                        <div class="md:col-span-12 flex justify-between items-center relative">
                            ${todayBadge}
                            <div>
                                <div class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${formatTanggalIndo(d.tgl)}</div>
                                <div class="text-xs bg-white dark:bg-gray-700 px-3 py-1.5 rounded-lg font-black text-blue-600 shadow-sm mt-1 italic inline-block">${d.jam || '-'}</div>
                            </div>
                            <div class="text-right flex-1 ml-4">
                                <div class="text-[9px] font-bold opacity-40 uppercase tracking-widest mb-0.5">Lokasi</div>
                                <div class="text-[11px] font-black uppercase text-gray-700 dark:text-gray-300 italic truncate block">📍 ${d.lokasi || '-'}</div>
                            </div>
                        </div>`;

                    container.insertAdjacentHTML('beforeend', `
                        <div class="bg-gray-50/50 dark:bg-gray-800/40 p-5 rounded-[1.5rem] border border-gray-100 dark:border-gray-700/50 hover:border-blue-200 transition duration-300 ${cardClass}">
                            <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4">${content}</div>
                        </div>`);
                });
            }

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPage}`;
            document.getElementById('btnPrev').disabled = (currentPage === 1);
            document.getElementById('btnNext').disabled = (currentPage === totalPage);
            document.getElementById('paginationContainer').classList.toggle('hidden', limitVal === 'all' || totalPage <= 1);
        }

        function ubahHalaman(offset) {
            currentPage += offset;
            muatTabelHalaman();
            document.getElementById('isiTabel').scrollIntoView({ behavior: 'smooth' });
        }

        async function simpanData() {
            const nama = document.getElementById('inputNama').value;
            if(!nama) return alert("Nama wajib diisi!");
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            const id = document.getElementById('editId').value || Date.now();
            const obj = { id, tipe: currentMode, nama, namaKlien: document.getElementById('inputNamaKlien').value || "-", kat: document.getElementById('inputKategori').value, tgl: document.getElementById('inputTanggal').value, jam: document.getElementById('inputJam').value, wa: document.getElementById('inputKontak').value, lokasi: document.getElementById('inputLokasi').value, alamat: document.getElementById('inputAlamat').value, rekanan: document.getElementById('inputRekanan').value || "BELUM ADA", harga: document.getElementById('inputHarga').value || 0 };
            
            const idx = dataSimpanan.findIndex(i => i.id == id);
            if(idx > -1) dataSimpanan[idx] = obj; else dataSimpanan.push(obj);

            // LOGIKA SORTING v4.5.6: Sebelum kirim, urutkan data agar di Spreadsheet juga rapi
            dataSimpanan.sort((a, b) => new Date(a.tgl || 0) - new Date(b.tgl || 0));

            try {
                await fetch(URL_SCRIPT + "?sheet=Agenda", { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
                await tarikDataCloud();
                bersihkanForm();
            } catch (e) { alert("Error Cloud. Cek Koneksi."); }
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function editData(id) {
            const d = dataSimpanan.find(i => i.id == id);
            if(!d) return;
            setAppMode(d.tipe);
            document.getElementById('editId').value = d.id;
            document.getElementById('inputNama').value = d.nama;
            document.getElementById('inputNamaKlien').value = d.namaKlien;
            document.getElementById('inputKategori').value = d.kat;
            document.getElementById('inputTanggal').value = d.tgl;
            document.getElementById('inputJam').value = d.jam;
            document.getElementById('inputKontak').value = d.wa;
            document.getElementById('inputLokasi').value = d.lokasi;
            document.getElementById('inputAlamat').value = d.alamat;
            document.getElementById('inputHarga').value = d.harga;
            document.getElementById('inputRekanan').value = d.rekanan;
            autoFillHarga();
            document.getElementById('formTitle').innerText = "Update Agenda";
            document.getElementById('btnBatal').classList.remove('hidden');
            document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth' });
        }

        async function hapusData(id) {
            if(!confirm("Hapus agenda?")) return;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            dataSimpanan = dataSimpanan.filter(i => i.id != id);
            await fetch(URL_SCRIPT + "?sheet=Agenda", { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
            await tarikDataCloud();
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function updateHighlights() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const allSorted = dataSimpanan.filter(d => d.tgl).sort((a,b) => new Date(a.tgl) - new Date(b.tgl));
            const hariIni = allSorted.filter(d => d.tgl === todayStr);
            
            document.getElementById('agendaHariIniList').innerHTML = hariIni.length > 0 ? hariIni.map(j => `<div class="bg-white/10 p-4 rounded-2xl border border-white/5"><div class="flex justify-between items-start mb-1"><span class="text-[10px] font-black text-blue-300 uppercase">${j.jam || '-'}</span><span class="text-[8px] bg-white/20 px-2 py-0.5 rounded-full font-bold uppercase">${j.kat}</span></div><div class="text-sm font-black uppercase truncate">${j.tipe === 'Vendor' ? j.namaKlien : j.nama}</div></div>`).join("") : `<div class="text-xs opacity-50 italic">Tidak ada agenda hari ini</div>`;
            
            document.getElementById('statTotal').innerText = allSorted.filter(d => new Date(d.tgl).getMonth() === now.getMonth()).length;
            document.getElementById('statVendor').innerText = allSorted.filter(d => d.tipe === 'Vendor' && new Date(d.tgl).getMonth() === now.getMonth()).length;
            
            const mendatang = allSorted.filter(d => new Date(d.tgl) > now).slice(0,5);
            document.getElementById('nextList').innerHTML = mendatang.length > 0 ? mendatang.map(m => `<div class="border-b border-white/10 pb-2 mb-2"><div class="text-[8px] font-black text-blue-300 uppercase">${formatTanggalIndo(m.tgl)}</div><div class="text-[10px] font-extrabold uppercase truncate">${m.tipe === 'Vendor' ? m.namaKlien : m.nama}</div></div>`).join("") : `<div class="text-[10px] opacity-40">Kosong</div>`;
        }

        function aturPilihanPaket() { const s = document.getElementById('inputKategori'); s.innerHTML = dataPaket.length ? dataPaket.map(p => `<option value="${p.namaPaket}">${p.namaPaket}</option>`).join('') : '<option value="Default">Default</option>'; autoFillHarga(); }
        function autoFillHarga() { const p = dataPaket.find(x => x.namaPaket === document.getElementById('inputKategori').value); if(p) { document.getElementById('inputHarga').value = p.hargaPaket; document.getElementById('textHargaDisplay').innerText = "Rp " + parseInt(p.hargaPaket).toLocaleString(); } }
        function formatTanggalIndo(t) { const d = new Date(t); return isNaN(d.getTime()) ? t : d.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}); }
        function toggleAdmin() { if(isAdmin) { location.reload(); return; } if(prompt("Pass:") === "123456") { isAdmin = true; document.getElementById('mainBody').classList.add('is-admin'); document.getElementById('tab-paket').classList.remove('hidden'); updateBadge(); resetHalamanDanCari(); } }
        function switchTab(t) { document.getElementById('section-agenda').classList.toggle('hidden', t !== 'agenda'); document.getElementById('section-paket').classList.toggle('hidden', t !== 'paket'); }
        function bersihkanForm() { document.getElementById('editId').value = ''; document.getElementById('formTitle').innerText = "Input Data"; document.getElementById('btnBatal').classList.add('hidden'); ['inputNama','inputNamaKlien','inputJam','inputKontak','inputLokasi','inputAlamat','inputRekanan','inputHarga'].forEach(i => document.getElementById(i).value = ''); }
        function updateBadge() { document.getElementById('badgeMode').innerText = isAdmin ? "MODE: ADMIN (" + currentMode + ")" : "MODE: " + currentMode; }
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        
        async function simpanPaket() { const nama = document.getElementById('p_nama').value; if(!nama) return; document.getElementById('loadingOverlay').classList.remove('hidden'); const id = document.getElementById('editIdPaket').value || Date.now(); const obj = { id, namaPaket: nama, hargaPaket: document.getElementById('p_harga').value || 0, deskripsi: document.getElementById('p_desc').value || "" }; const idx = dataPaket.findIndex(p => p.id == id); if(idx > -1) dataPaket[idx] = obj; else dataPaket.push(obj); await fetch(URL_SCRIPT + "?sheet=Paket", { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataPaket) }); await tarikPaketCloud(); document.getElementById('loadingOverlay').classList.add('hidden'); }
        function renderTabelPaket() { const container = document.getElementById('isiTabelPaket'); container.innerHTML = dataPaket.map(p => `<tr class="border-b dark:border-gray-700"><td class="py-4 px-4 italic">${p.namaPaket}</td><td class="text-right px-4">Rp ${parseInt(p.hargaPaket || 0).toLocaleString()}</td><td class="text-center px-4"><button onclick="editPaket(${p.id})" class="p-2 opacity-50">✏️</button></td></tr>`).join(''); }
    </script>
</body>
</html>
