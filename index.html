<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veridical.co - Management System v4.5.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7ff', 100: '#e0effe', 200: '#bae0fd', 300: '#7cc8fc', 400: '#36acf9', 500: '#0c91eb', 600: '#0071c5', 700: '#015da3', 800: '#064f86', 900: '#0b426f' }
                    },
                    borderRadius: { '4xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { @apply bg-[#F9FAFB] text-slate-900 transition-colors duration-300; }
        .dark body { @apply bg-[#0b1120] text-slate-100; }

        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .is-admin .admin-flex { display: flex !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 dark:bg-slate-800 rounded-full; }

        .glass-card { @apply bg-white dark:bg-[#151c2c] border border-slate-100 dark:border-slate-800 shadow-sm rounded-[2rem] transition-all duration-300; }
        
        .form-input-veridical { 
            @apply w-full px-5 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-800 rounded-2xl font-semibold text-slate-900 dark:text-white outline-none transition-all duration-300 focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-ring { border: 3px solid rgba(12, 145, 235, 0.1); border-top: 3px solid #0c91eb; border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body id="mainBody">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 dark:bg-slate-950/90 flex flex-col items-center justify-center hidden backdrop-blur-sm">
        <div class="loader-ring mb-4"></div>
        <p class="text-[10px] font-black text-brand-600 uppercase tracking-widest animate-pulse">Syncing System v4.5.6...</p>
    </div>

    <div id="selectionScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 text-center px-6">
        <div class="max-w-sm w-full">
            <h1 class="text-4xl font-extrabold italic uppercase tracking-tighter text-white mb-16">Veridical<span class="text-brand-500">.co</span></h1>
            <div class="flex flex-col gap-4">
                <button onclick="openApp('Pribadi')" class="bg-white text-slate-900 p-6 rounded-3xl font-extrabold uppercase hover:scale-105 transition-all">👤 Personal Access</button>
                <button onclick="openApp('Vendor')" class="bg-slate-800 text-white p-6 rounded-3xl border border-slate-700 font-extrabold uppercase hover:scale-105 transition-all">💄 Vendor Access</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-all duration-700 container mx-auto p-4 md:p-8 max-w-7xl pb-20">
        
        <header class="flex justify-between items-center mb-10 pb-6 border-b dark:border-slate-800">
            <div>
                <div id="badgeMode" class="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-[9px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block tracking-widest italic italic">MODE: LOADING</div>
                <h1 class="text-3xl font-black text-slate-950 dark:text-white tracking-tighter uppercase italic">Veridical<span class="text-brand-600">.co</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdmin()" class="w-10 h-10 flex items-center justify-center glass-card hover:bg-slate-50 dark:hover:bg-slate-800 transition">🔓</button>
                <button onclick="document.documentElement.classList.toggle('dark')" class="w-10 h-10 flex items-center justify-center glass-card hover:bg-slate-50 dark:hover:bg-slate-800 transition">🌙</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10">
            <div class="lg:col-span-8 bg-slate-900 text-white p-8 rounded-4xl relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-brand-400 mb-6 flex items-center gap-2 italic">● Agenda Hari Ini</h3>
                    <div id="agendaHariIniList" class="space-y-4"></div>
                </div>
                <div class="absolute -right-10 -bottom-10 text-[12rem] font-black italic text-white/[0.03] pointer-events-none uppercase">Today</div>
            </div>
            
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass-card p-8 flex-1">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-6 italic">Next Schedule</h3>
                    <div id="nextList" class="space-y-4"></div>
                </div>
                <div class="glass-card p-8 bg-brand-600 border-none text-white">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-bold uppercase opacity-60">Total Agenda</p>
                            <h2 id="statTotal" class="text-5xl font-black italic">0</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold uppercase opacity-60">Vendor</p>
                            <h2 id="statVendor" class="text-2xl font-black italic">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav id="navAdmin" class="admin-flex hidden mb-8 gap-2 bg-slate-100 dark:bg-slate-900 p-1.5 rounded-2xl w-fit">
            <button onclick="switchTab('agenda')" id="tab-agenda" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase bg-white dark:bg-slate-800 shadow-sm">📅 Database</button>
            <button onclick="switchTab('paket')" id="tab-paket" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400">🏷️ Paket</button>
        </nav>

        <div id="section-agenda" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div id="formContainer" class="lg:col-span-4 glass-card p-8 h-fit sticky top-6">
                <h2 class="text-lg font-black mb-10 text-slate-900 dark:text-white uppercase italic tracking-widest border-b dark:border-slate-800 pb-4">Input Data</h2>
                <div class="space-y-6">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2 mb-1 block" id="labelVendor">Nama</label>
                        <input type="text" id="inputNama" class="form-input-veridical">
                    </div>
                    <div id="containerNamaKlien" class="hidden">
                        <label class="text-[9px] font-bold text-purple-500 uppercase ml-2 mb-1 block">Nama Klien (Pengantin)</label>
                        <input type="text" id="inputNamaKlien" class="form-input-veridical !border-purple-200 dark:!border-purple-900/50">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Paket</label>
                            <select id="inputKategori" onchange="autoFillHarga()" class="form-input-veridical text-xs"></select>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Tanggal</label>
                            <input type="date" id="inputTanggal" class="form-input-veridical text-xs">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="inputJam" placeholder="Jam Acara" class="form-input-veridical">
                        <input type="text" id="inputKontak" placeholder="WhatsApp" class="form-input-veridical">
                    </div>
                    <input type="text" id="inputLokasi" placeholder="Lokasi (Gedung/Rumah)" class="form-input-veridical">
                    <textarea id="inputAlamat" placeholder="Alamat Lengkap..." class="form-input-veridical h-24 resize-none"></textarea>
                    
                    <div class="admin-only border-t dark:border-slate-800 pt-6 space-y-4">
                        <input type="number" id="inputHarga" placeholder="Harga Deal" class="form-input-veridical !text-green-600 font-bold">
                        <input type="text" id="inputRekanan" placeholder="Handler Photographer" class="form-input-veridical !text-orange-500 uppercase italic">
                    </div>

                    <button onclick="simpanData()" class="w-full bg-brand-600 text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest shadow-xl shadow-brand-500/20 active:scale-95 transition-all">Simpan Agenda</button>
                    <button id="btnBatal" onclick="bersihkanForm()" class="hidden w-full bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold py-3 rounded-2xl uppercase text-[9px]">Batal Edit</button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card p-8">
                    <div class="flex flex-wrap justify-between items-center mb-8 pb-4 border-b dark:border-slate-800">
                        <h2 class="text-lg font-black uppercase italic tracking-wider">Live Database</h2>
                        <div class="flex gap-2">
                            <select id="filterLimit" onchange="cariAgenda()" class="bg-slate-50 dark:bg-slate-900 px-3 py-2 rounded-xl text-[10px] font-bold outline-none border border-slate-100 dark:border-slate-800">
                                <option value="5">5 Baris</option><option value="10" selected>10 Baris</option><option value="25">25 Baris</option><option value="all">Semua</option>
                            </select>
                            <input type="text" id="searchInput" onkeyup="cariAgenda()" placeholder="Cari..." class="bg-slate-50 dark:bg-slate-900 px-4 py-2 rounded-xl text-xs font-bold outline-none border border-slate-100 dark:border-slate-800 w-32 md:w-48">
                        </div>
                    </div>
                    <div id="isiTabel" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="section-paket" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 glass-card p-8 h-fit">
                <h2 class="text-lg font-black mb-8 uppercase italic">Master Paket</h2>
                <div class="space-y-4">
                    <input type="hidden" id="editIdPaket">
                    <input type="text" id="p_nama" placeholder="Nama Paket" class="form-input-veridical">
                    <input type="number" id="p_harga" placeholder="Harga Default" class="form-input-veridical">
                    <button onclick="simpanPaket()" class="w-full bg-brand-600 text-white font-black py-4 rounded-2xl uppercase text-[10px]">Update Paket</button>
                </div>
            </div>
            <div class="lg:col-span-8 glass-card p-8 overflow-x-auto">
                <table class="w-full text-[10px] font-bold uppercase">
                    <thead class="text-slate-400 border-b dark:border-slate-800">
                        <tr><th class="pb-4 text-left px-4">Nama Paket</th><th class="pb-4 text-right px-4">Harga Default</th><th class="pb-4 text-center px-4">Aksi</th></tr>
                    </thead>
                    <tbody id="isiTabelPaket" class="dark:text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyUQB4oF5LRpn2iC3kvCZlZk4yy0u5LjbyRBGmy5ldt4wRI1n87zybB3ut_LlEEGhJKXA/exec";
        let currentMode = "", isAdmin = false, dataSimpanan = [], dataPaket = [];

        async function openApp(mode) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            currentMode = mode;
            document.getElementById('containerNamaKlien').classList.toggle('hidden', mode !== 'Vendor');
            document.getElementById('labelVendor').innerText = (mode === 'Vendor') ? "Nama Vendor MUA" : "Nama Lengkap";
            try { await Promise.all([tarikDataCloud(), tarikPaketCloud()]); } catch (e) {}
            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            setTimeout(() => { document.getElementById('mainContent').classList.add('opacity-100'); }, 50);
            document.getElementById('loadingOverlay').classList.add('hidden');
            updateBadge();
        }

        async function tarikDataCloud() {
            const res = await fetch(`${URL_SCRIPT}?sheet=Agenda&t=${Date.now()}`);
            dataSimpanan = await res.json();
            cariAgenda();
            updateHighlights();
        }

        async function tarikPaketCloud() {
            const res = await fetch(`${URL_SCRIPT}?sheet=Paket&t=${Date.now()}`);
            dataPaket = await res.json();
            document.getElementById('inputKategori').innerHTML = dataPaket.map(p => `<option value="${p.namaPaket}">${p.namaPaket}</option>`).join('');
            renderTabelPaket();
        }

        function cariAgenda() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const limit = document.getElementById('filterLimit').value;
            let filtered = dataSimpanan.filter(d => (d.nama||"").toLowerCase().includes(s) || (d.namaKlien||"").toLowerCase().includes(s) || (d.tgl||"").includes(s)).sort((a,b) => new Date(a.tgl) - new Date(b.tgl));
            
            const displayData = limit === 'all' ? filtered : filtered.slice(0, parseInt(limit));
            const container = document.getElementById('isiTabel');
            
            container.innerHTML = displayData.map(d => `
                <div class="glass-card p-6 border-l-4 ${d.tgl === new Date().toISOString().split('T')[0] ? 'border-brand-500' : 'border-transparent'}">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-1">
                            <div class="text-[10px] text-brand-600 font-extrabold uppercase italic mb-1">${d.tgl} — ${d.jam}</div>
                            <div class="text-base font-black uppercase text-slate-950 dark:text-white">${d.tipe === 'Vendor' ? d.namaKlien : d.nama}</div>
                            <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2">
                                <span class="text-[9px] text-slate-400 font-bold uppercase italic tracking-widest">📍 ${d.lokasi}</span>
                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">🏷️ ${d.kat}</span>
                                ${isAdmin ? `<span class="text-[9px] text-orange-500 font-bold uppercase">📸 Handler: ${d.rekanan || '-'}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2 items-center">
                            ${isAdmin ? `
                                <button onclick="editData(${d.id})" class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-brand-600 hover:text-white transition">✏️</button>
                                <a href="https://wa.me/${d.wa}" target="_blank" class="w-10 h-10 flex items-center justify-center bg-green-50 dark:bg-green-900/20 text-green-600 rounded-xl hover:bg-green-600 hover:text-white transition">📞</a>
                                <button onclick="hapusData(${d.id})" class="w-10 h-10 flex items-center justify-center bg-red-50 dark:bg-red-900/20 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition">🗑️</button>
                            ` : `<div class="text-[8px] font-black text-slate-300 dark:text-slate-700 tracking-tighter uppercase rotate-90">VERIDICAL</div>`}
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-10 opacity-30 italic text-xs uppercase tracking-widest">No Data Found</div>';
        }

        function updateHighlights() {
            const todayStr = new Date().toISOString().split('T')[0];
            const hariIni = dataSimpanan.filter(d => d.tgl === todayStr);
            document.getElementById('agendaHariIniList').innerHTML = hariIni.map(j => `
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10 flex justify-between items-center group hover:bg-white/10 transition">
                    <div>
                        <p class="text-[10px] font-black text-brand-400 uppercase italic mb-1">${j.jam} — ${j.lokasi}</p>
                        <p class="text-sm font-black uppercase">${j.tipe === 'Vendor' ? j.namaKlien : j.nama}</p>
                        <p class="text-[9px] opacity-40 font-bold mt-1 uppercase italic">MUA: ${j.nama} | Handler: ${j.rekanan || '-'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black text-brand-500 uppercase">Live Now</p>
                    </div>
                </div>
            `).join('') || '<p class="opacity-30 italic text-[10px] py-4 uppercase tracking-[0.2em]">Tidak ada jadwal hari ini</p>';
            
            const mendatang = dataSimpanan.filter(d => new Date(d.tgl) > new Date()).slice(0, 3);
            document.getElementById('nextList').innerHTML = mendatang.map(m => `
                <div class="border-b dark:border-slate-800 pb-3 last:border-0">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[9px] font-black text-brand-600 uppercase">${m.tgl}</span>
                        <span class="text-[8px] text-slate-400 font-bold italic">${m.jam}</span>
                    </div>
                    <p class="text-[11px] font-extrabold uppercase truncate">${m.tipe === 'Vendor' ? m.namaKlien : m.nama}</p>
                    <p class="text-[8px] text-slate-500 truncate mt-1 italic uppercase">${m.lokasi}</p>
                </div>
            `).join('') || '<p class="opacity-30 italic text-[9px] uppercase">Belum ada jadwal baru</p>';

            document.getElementById('statTotal').innerText = dataSimpanan.length;
            document.getElementById('statVendor').innerText = dataSimpanan.filter(v => v.tipe === 'Vendor').length;
        }

        function toggleAdmin() { if(prompt("System Password:") === "123456") { isAdmin = true; document.getElementById('mainBody').classList.add('is-admin'); document.getElementById('navAdmin').classList.remove('hidden'); updateBadge(); cariAgenda(); } }
        function updateBadge() { document.getElementById('badgeMode').innerText = (isAdmin ? "SYSTEM ADMIN" : "CLIENT ACCESS") + " - " + currentMode; }
        function autoFillHarga() { const p = dataPaket.find(x => x.namaPaket === document.getElementById('inputKategori').value); if(p) document.getElementById('inputHarga').value = p.hargaPaket; }

        async function simpanData() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const obj = { id: document.getElementById('editId').value || Date.now(), tipe: currentMode, nama: document.getElementById('inputNama').value, namaKlien: document.getElementById('inputNamaKlien').value, kat: document.getElementById('inputKategori').value, tgl: document.getElementById('inputTanggal').value, jam: document.getElementById('inputJam').value, wa: document.getElementById('inputKontak').value, lokasi: document.getElementById('inputLokasi').value, alamat: document.getElementById('inputAlamat').value, rekanan: document.getElementById('inputRekanan').value, harga: document.getElementById('inputHarga').value };
            await fetch(`${URL_SCRIPT}?sheet=Agenda`, { method: 'POST', mode: 'no-cors', body: JSON.stringify([...dataSimpanan.filter(i => i.id != obj.id), obj]) });
            await tarikDataCloud(); bersihkanForm(); document.getElementById('loadingOverlay').classList.add('hidden');
        }

        async function hapusData(id) { if(confirm("Hapus agenda ini?")) { document.getElementById('loadingOverlay').classList.remove('hidden'); await fetch(`${URL_SCRIPT}?sheet=Agenda`, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan.filter(i => i.id != id)) }); await tarikDataCloud(); document.getElementById('loadingOverlay').classList.add('hidden'); } }
        function editData(id) { const d = dataSimpanan.find(i => i.id == id); if(d) { document.getElementById('editId').value = d.id; document.getElementById('inputNama').value = d.nama; document.getElementById('inputNamaKlien').value = d.namaKlien; document.getElementById('inputKategori').value = d.kat; document.getElementById('inputTanggal').value = d.tgl; document.getElementById('inputJam').value = d.jam; document.getElementById('inputKontak').value = d.wa; document.getElementById('inputLokasi').value = d.lokasi; document.getElementById('inputAlamat').value = d.alamat; document.getElementById('inputHarga').value = d.harga; document.getElementById('inputRekanan').value = d.rekanan; document.getElementById('btnBatal').classList.remove('hidden'); document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth' }); } }
        function bersihkanForm() { ['editId','inputNama','inputNamaKlien','inputJam','inputKontak','inputLokasi','inputAlamat','inputHarga','inputRekanan'].forEach(id => document.getElementById(id).value = ''); document.getElementById('btnBatal').classList.add('hidden'); }
        function switchTab(t) { document.getElementById('section-agenda').classList.toggle('hidden', t !== 'agenda'); document.getElementById('section-paket').classList.toggle('hidden', t !== 'paket'); document.getElementById('tab-agenda').className = t === 'agenda' ? 'px-6 py-3 rounded-xl text-[10px] font-black uppercase bg-white dark:bg-slate-800 shadow-sm' : 'px-6 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400'; document.getElementById('tab-paket').className = t === 'paket' ? 'px-6 py-3 rounded-xl text-[10px] font-black uppercase bg-white dark:bg-slate-800 shadow-sm' : 'px-6 py-3 rounded-xl text-[10px] font-black uppercase text-slate-400'; }

        async function simpanPaket() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const obj = { id: document.getElementById('editIdPaket').value || Date.now(), namaPaket: document.getElementById('p_nama').value, hargaPaket: document.getElementById('p_harga').value };
            await fetch(`${URL_SCRIPT}?sheet=Paket`, { method: 'POST', mode: 'no-cors', body: JSON.stringify([...dataPaket.filter(i => i.id != obj.id), obj]) });
            await tarikPaketCloud(); document.getElementById('loadingOverlay').classList.add('hidden');
        }
        function renderTabelPaket() { document.getElementById('isiTabelPaket').innerHTML = dataPaket.map(p => `<tr class="border-b dark:border-slate-800"><td class="py-4 px-4">${p.namaPaket}</td><td class="text-right px-4">Rp ${parseInt(p.hargaPaket).toLocaleString()}</td><td class="text-center px-4"><button onclick="editPaket(${p.id})" class="opacity-40 hover:opacity-100 transition">✏️</button></td></tr>`).join(''); }
        function editPaket(id) { const p = dataPaket.find(x => x.id == id); if(p) { document.getElementById('editIdPaket').value = p.id; document.getElementById('p_nama').value = p.namaPaket; document.getElementById('p_harga').value = p.hargaPaket; } }
    </script>
</body>
</html>
