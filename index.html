<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadzar Photowork - Cloud v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        .loader-ring { border: 3px solid rgba(37, 99, 235, 0.1); border-top: 3px solid #2563EB; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .glass-box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body id="mainBody" class="bg-[#F8FAFC] dark:bg-gray-900 text-gray-800 dark:text-gray-100 text-sm">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/95 dark:bg-gray-900/95 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="loader-ring"></div>
    </div>

    <div id="selectionScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-blue-600 text-center px-6 text-white">
        <div class="max-w-md w-full">
            <h1 class="text-5xl font-extrabold mb-2 italic uppercase">Nadzar</h1>
            <p class="mb-10 opacity-70 tracking-[0.3em] uppercase text-[10px] font-bold">Automated Cloud System</p>
            <div class="flex flex-col gap-4">
                <button onclick="openApp('Pribadi')" class="bg-white text-blue-600 p-6 rounded-[2rem] font-black uppercase tracking-widest hover:scale-105 transition shadow-2xl">👤 Input Klien</button>
                <button onclick="openApp('Vendor')" class="bg-blue-500 text-white p-6 rounded-[2rem] border-2 border-blue-400 font-black uppercase tracking-widest hover:scale-105 transition shadow-2xl">💄 Input MUA</button>
            </div>
            <p class="mt-8 text-[9px] opacity-50 tracking-widest font-bold">NADZAR PHOTOWORK © 2026</p>
        </div>
    </div>

    <div id="mainContent" class="hidden opacity-0 transition-all duration-700 container mx-auto p-4 md:p-10 max-w-7xl">
        <div class="flex justify-between items-start mb-8">
            <div>
                <div id="badgeMode" class="bg-blue-100 text-blue-600 text-[9px] font-bold px-3 py-1 rounded-full uppercase mb-2 inline-block">LOADING...</div>
                <h1 class="text-3xl font-extrabold text-[#2563EB] tracking-tighter">Nadzar Photowork</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleAdmin()" id="btnLock" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md text-lg hover:scale-110 transition">🔓</button>
                <button id="themeToggle" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-md hover:scale-110 transition">🌙</button>
            </div>
        </div>

        <div class="admin-only mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden flex flex-col md:flex-row gap-6 min-h-[320px]">
                    <div class="flex-1 z-10">
                        <h3 class="text-[9px] font-black uppercase tracking-[0.3em] text-blue-200 mb-6 flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-blue-300 animate-ping"></span> AGENDA HARI INI
                        </h3>
                        <div id="agendaHariIniList" class="space-y-4 overflow-y-auto max-h-[200px] custom-scroll pr-4"></div>
                    </div>
                    <div class="w-full md:w-72 glass-box rounded-[1.5rem] p-6 z-10">
                        <h3 class="text-[8px] font-black uppercase tracking-widest text-blue-300 mb-4">JADWAL SELANJUTNYA</h3>
                        <div id="nextList" class="space-y-4 overflow-y-auto max-h-[180px] custom-scroll pr-2"></div>
                    </div>
                </div>

                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 flex flex-col justify-center text-center">
                    <h3 class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-gray-400 mb-6">RINGKASAN JOB BULAN INI</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="border-r dark:border-gray-700">
                            <div id="statTotal" class="text-5xl font-black text-blue-600">0</div>
                            <div class="text-[9px] font-bold text-blue-400 uppercase mt-2 tracking-widest">TOTAL JOB</div>
                        </div>
                        <div>
                            <div id="statVendor" class="text-5xl font-black text-purple-600">0</div>
                            <div class="text-[9px] font-bold text-purple-400 uppercase mt-2 tracking-widest">MUA JOB</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-6 border-b border-gray-200 dark:border-gray-700 flex gap-6">
            <button onclick="switchTab('agenda')" id="tab-agenda" class="border-b-2 border-blue-600 pb-2 text-[10px] font-black uppercase tracking-widest">📅 Agenda</button>
            <button onclick="switchTab('paket')" id="tab-paket" class="hidden pb-2 text-[10px] font-black uppercase tracking-widest opacity-40">🏷️ Master Paket</button>
        </div>

        <div id="section-agenda">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div id="formContainer" class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 h-fit">
                    <h2 id="formTitle" class="text-xl font-black mb-6 text-blue-600 uppercase italic">Input Data</h2>
                    <div class="space-y-4">
                        <input type="hidden" id="editId">
                        <input type="text" id="inputNama" placeholder="Nama Utama" class="w-full p-4 rounded-2xl border dark:bg-gray-700 dark:border-gray-600 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        <div id="containerNamaKlien" class="hidden"><input type="text" id="inputNamaKlien" placeholder="Nama Klien (MUA)" class="w-full p-4 rounded-2xl border border-purple-100 dark:bg-gray-700 font-bold italic"></div>
                        
                        <div class="space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="inputKategori" onchange="autoFillHarga()" class="p-4 rounded-2xl border dark:bg-gray-700 font-bold outline-none"></select>
                                <input type="date" id="inputTanggal" class="p-4 rounded-2xl border dark:bg-gray-700 outline-none">
                            </div>
                            <div id="infoHargaTampil" class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl border border-blue-100 dark:border-blue-800 flex justify-between items-center">
                                <span class="text-[9px] font-bold opacity-50 uppercase tracking-widest">Estimasi Harga:</span>
                                <span id="textHargaDisplay" class="text-xs font-black text-blue-600 dark:text-blue-400 italic">Rp 0</span>
                            </div>
                        </div>

                        <div class="admin-only"><input type="number" id="inputHarga" placeholder="Harga IDR" class="w-full p-4 rounded-2xl border border-green-100 dark:bg-gray-700 font-bold"></div>
                        <input type="text" id="inputJam" placeholder="Jam" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <input type="text" id="inputKontak" placeholder="WhatsApp (Contoh: 0812...)" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <input type="text" id="inputLokasi" placeholder="Lokasi" class="w-full p-4 rounded-2xl border dark:bg-gray-700">
                        <textarea id="inputAlamat" placeholder="Alamat Lengkap" class="w-full p-4 rounded-2xl border dark:bg-gray-700"></textarea>
                        <div id="fieldRekanan" class="admin-only"><input type="text" id="inputRekanan" placeholder="Handler Fotografer" class="w-full p-4 rounded-2xl border border-orange-100 dark:bg-gray-700 font-bold"></div>
                        
                        <div class="pt-2 flex flex-col gap-2">
                            <button onclick="simpanData()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-lg transition active:scale-95">Simpan Agenda</button>
                            <button id="btnBatal" onclick="bersihkanForm()" class="hidden w-full bg-red-50 text-red-600 font-bold py-3 rounded-2xl uppercase text-[9px] tracking-widest border border-red-100">Batal Ubah</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-8 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700 min-h-[500px]">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                        <h2 class="text-xl font-black text-blue-600 uppercase italic tracking-tighter">Daftar Agenda</h2>
                        <div class="relative w-full md:w-64">
                            <input type="text" id="searchInput" onkeyup="cariAgenda()" placeholder="Cari nama/mua/lokasi..." class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-gray-50 dark:bg-gray-700 border-none text-[11px] font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                            <span class="absolute left-3 top-2.5 opacity-30">🔍</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-separate border-spacing-y-2">
                            <tbody id="isiTabel"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-paket" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] border border-blue-100 h-fit">
                    <h2 class="text-xl font-black text-blue-600 uppercase italic">Master Paket</h2>
                    <div class="space-y-4 mt-6">
                        <input type="hidden" id="editIdPaket">
                        <input type="text" id="p_nama" placeholder="Nama Paket" class="w-full p-4 rounded-2xl border dark:bg-gray-700 font-bold">
                        <input type="number" id="p_harga" placeholder="Harga Default" class="w-full p-4 rounded-2xl border dark:bg-gray-700 font-bold">
                        <textarea id="p_desc" placeholder="Keterangan Paket" class="w-full p-4 rounded-2xl border dark:bg-gray-700"></textarea>
                        <button onclick="simpanPaket()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest">Simpan Paket</button>
                    </div>
                </div>
                <div class="lg:col-span-8 bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] shadow-xl border dark:border-gray-700">
                    <div class="overflow-x-auto">
                        <table class="w-full text-[10px] font-bold uppercase">
                            <thead><tr class="opacity-30 border-b dark:border-gray-700"><th class="pb-4 text-left px-4">Paket</th><th class="pb-4 text-right px-4">Harga</th><th class="pb-4 text-center px-4">Aksi</th></tr></thead>
                            <tbody id="isiTabelPaket"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyUQB4oF5LRpn2iC3kvCZlZk4yy0u5LjbyRBGmy5ldt4wRI1n87zybB3ut_LlEEGhJKXA/exec";
        let currentMode = "", isAdmin = false, dataSimpanan = [], dataPaket = [];

        async function openApp(mode) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            setAppMode(mode);
            try {
                await Promise.all([tarikDataCloud(), tarikPaketCloud()]);
            } catch (e) { console.log("Init Error"); }
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            setTimeout(() => document.getElementById('mainContent').classList.add('opacity-100'), 50);
            updateBadge();
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function setAppMode(mode) {
            currentMode = mode;
            document.getElementById('containerNamaKlien').classList.toggle('hidden', mode !== 'Vendor');
            updateBadge();
        }

        async function tarikDataCloud() {
            try {
                const res = await fetch(URL_SCRIPT + "?sheet=Agenda&t=" + Date.now());
                dataSimpanan = await res.json();
                muatTabel(dataSimpanan);
                updateHighlights();
            } catch (e) { console.log("Agenda Fail"); }
        }

        async function tarikPaketCloud() {
            try {
                const res = await fetch(URL_SCRIPT + "?sheet=Paket&t=" + Date.now());
                dataPaket = await res.json();
                aturPilihanPaket();
                renderTabelPaket();
            } catch (e) { console.log("Paket Fail"); }
        }

        function muatTabel(data) {
            const container = document.getElementById('isiTabel');
            container.innerHTML = '';
            const sorted = data.sort((a,b) => new Date(a.tgl || 0) - new Date(b.tgl || 0));
            
            sorted.forEach(d => {
                const waLink = d.wa ? `https://wa.me/${d.wa.replace(/^0/, '62')}` : '#';
                const row = `
                <tr class="bg-gray-50/50 dark:bg-gray-800/30 rounded-2xl overflow-hidden shadow-sm agenda-row">
                    <td class="py-5 px-6 rounded-l-2xl">
                        <div class="text-[9px] font-black text-blue-600 mb-1 tracking-tighter uppercase">${formatTanggalIndo(d.tgl)} | ${d.jam || '-'}</div>
                        <div class="text-sm font-black uppercase text-gray-800 dark:text-white leading-tight">${d.tipe === 'Vendor' ? d.namaKlien : d.nama}</div>
                        <div class="text-[9px] font-bold text-purple-600 dark:text-purple-400 uppercase mt-1">
                            ${d.tipe === 'Vendor' ? 'MUA: ' + d.nama : 'Klien Pribadi'}
                        </div>
                        <div class="text-[9px] opacity-40 uppercase font-bold italic mt-1">📍 ${d.lokasi || '-'}</div>
                        ${isAdmin ? `
                            <div class="mt-2 pt-2 border-t dark:border-gray-700/50">
                                <span class="text-[9px] bg-green-500/10 text-green-600 px-2 py-0.5 rounded font-black italic">💰 Rp ${parseInt(d.harga || 0).toLocaleString()}</span>
                                <div class="text-[8px] text-orange-500 font-black mt-1 uppercase italic">📸 Handler: ${d.rekanan || '-'}</div>
                            </div>
                        ` : ''}
                    </td>
                    <td class="py-5 px-6 text-right rounded-r-2xl">
                        <div class="flex justify-end gap-2">
                            ${isAdmin ? `
                                <a href="${waLink}" target="_blank" class="w-8 h-8 flex items-center justify-center bg-green-100 text-green-600 rounded-full">📞</a>
                                <button onclick="editData(${d.id})" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-full">✏️</button>
                                <button onclick="hapusData(${d.id})" class="w-8 h-8 bg-red-50 text-red-600 rounded-full">🗑️</button>
                            ` : `<span class="text-[9px] bg-white dark:bg-gray-700 px-3 py-1.5 rounded-xl font-black shadow-sm border border-blue-50 dark:border-gray-600">${d.jam || '-'}</span>`}
                        </div>
                    </td>
                </tr>`;
                container.insertAdjacentHTML('beforeend', row);
            });
        }

        function cariAgenda() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filterData = dataSimpanan.filter(d => 
                (d.nama || "").toLowerCase().includes(val) || 
                (d.namaKlien || "").toLowerCase().includes(val) || 
                (d.lokasi || "").toLowerCase().includes(val)
            );
            muatTabel(filterData);
        }

        function updateHighlights() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const allSorted = dataSimpanan.filter(d => d.tgl).sort((a,b) => new Date(a.tgl) - new Date(b.tgl));
            
            const hariIni = allSorted.filter(d => d.tgl === todayStr);
            const listHariIni = document.getElementById('agendaHariIniList');
            listHariIni.innerHTML = hariIni.length > 0 ? hariIni.map(j => `
                <div class="bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/5">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black text-blue-300 uppercase tracking-widest">${j.jam || '-'}</span>
                        <span class="text-[8px] bg-white/20 px-2 py-0.5 rounded-full font-bold uppercase">${j.kat}</span>
                    </div>
                    <div class="text-sm font-black uppercase truncate">${j.tipe === 'Vendor' ? j.namaKlien : j.nama}</div>
                    <div class="flex flex-col gap-0.5 mt-2">
                        <div class="text-[9px] font-bold text-purple-300 uppercase">💄 MUA: ${j.tipe === 'Vendor' ? j.nama : 'Pribadi'}</div>
                        <div class="text-[9px] font-black text-yellow-300 uppercase italic">📸 Handler: ${j.rekanan || 'Belum Ada'}</div>
                    </div>
                </div>`).join("") : `<div class="text-xs opacity-50 italic">Tidak ada agenda hari ini</div>`;

            const mendatang = allSorted.filter(d => new Date(d.tgl) > now);
            const nextList = document.getElementById('nextList');
            nextList.innerHTML = mendatang.length > 0 ? mendatang.slice(0,5).map(m => `
                <div class="border-b border-white/10 pb-3">
                    <div class="text-[8px] font-black text-blue-300 uppercase mb-1">${formatTanggalIndo(m.tgl)} | ${m.jam || '-'}</div>
                    <div class="text-[10px] font-extrabold uppercase truncate">${m.tipe === 'Vendor' ? m.namaKlien : m.nama}</div>
                    <div class="text-[8px] opacity-70 uppercase mt-1">
                        💄 ${m.tipe === 'Vendor' ? m.nama : 'Pribadi'} | 📸 ${m.rekanan || '-'}
                    </div>
                </div>`).join("") : `<div class="text-[10px] opacity-40 italic">Tidak ada jadwal terdekat</div>`;

            const bulanIni = allSorted.filter(d => new Date(d.tgl).getMonth() === now.getMonth());
            document.getElementById('statTotal').innerText = bulanIni.length;
            document.getElementById('statVendor').innerText = bulanIni.filter(d => d.tipe === 'Vendor').length;
        }

        async function simpanData() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const id = document.getElementById('editId').value || Date.now();
            const obj = { 
                id, 
                tipe: currentMode, 
                nama: document.getElementById('inputNama').value, 
                namaKlien: document.getElementById('inputNamaKlien').value || "-", 
                kat: document.getElementById('inputKategori').value, 
                tgl: document.getElementById('inputTanggal').value, 
                jam: document.getElementById('inputJam').value, 
                wa: document.getElementById('inputKontak').value, 
                lokasi: document.getElementById('inputLokasi').value, 
                alamat: document.getElementById('inputAlamat').value, 
                rekanan: document.getElementById('inputRekanan').value || "BELUM ADA", 
                harga: document.getElementById('inputHarga').value || 0 
            };
            const idx = dataSimpanan.findIndex(i => i.id == id);
            if(idx > -1) dataSimpanan[idx] = obj; else dataSimpanan.push(obj);
            await fetch(URL_SCRIPT + "?sheet=Agenda", { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
            await tarikDataCloud();
            bersihkanForm();
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function editData(id) {
            const d = dataSimpanan.find(i => i.id == id);
            if(!d) return;
            setAppMode(d.tipe);
            document.getElementById('editId').value = d.id;
            document.getElementById('inputNama').value = d.nama;
            document.getElementById('inputNamaKlien').value = d.namaKlien;
            document.getElementById('inputKategori').value = d.kat;
            document.getElementById('inputTanggal').value = d.tgl;
            document.getElementById('inputJam').value = d.jam;
            document.getElementById('inputKontak').value = d.wa;
            document.getElementById('inputLokasi').value = d.lokasi;
            document.getElementById('inputAlamat').value = d.alamat;
            document.getElementById('inputHarga').value = d.harga;
            document.getElementById('inputRekanan').value = d.rekanan;
            
            autoFillHarga(); // Trigger update display harga saat edit
            document.getElementById('formTitle').innerText = "Update Data";
            document.getElementById('btnBatal').classList.remove('hidden');
            document.getElementById('inputNama').focus();
        }

        function bersihkanForm() {
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').innerText = "Input Data";
            document.getElementById('btnBatal').classList.add('hidden');
            ['inputNama','inputNamaKlien','inputJam','inputKontak','inputLokasi','inputAlamat','inputRekanan','inputHarga'].forEach(i => document.getElementById(i).value = '');
            document.getElementById('textHargaDisplay').innerText = "Rp 0";
        }

        async function hapusData(id) {
            if(!confirm("Hapus data ini?")) return;
            dataSimpanan = dataSimpanan.filter(i => i.id != id);
            document.getElementById('loadingOverlay').classList.remove('hidden');
            await fetch(URL_SCRIPT + "?sheet=Agenda", { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataSimpanan) });
            await tarikDataCloud();
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function toggleAdmin() {
            if(isAdmin) {
                isAdmin = false;
                document.getElementById('mainBody').classList.remove('is-admin');
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('opacity-100');
                document.getElementById('selectionScreen').style.display = 'flex';
                document.getElementById('tab-paket').classList.add('hidden');
                return;
            }
            if(prompt("Admin Password:") === "123456") {
                isAdmin = true;
                document.getElementById('mainBody').classList.add('is-admin');
                document.getElementById('tab-paket').classList.remove('hidden');
                updateBadge(); muatTabel(dataSimpanan); updateHighlights();
            }
        }

        function renderTabelPaket() {
            const container = document.getElementById('isiTabelPaket');
            container.innerHTML = dataPaket.map(p => `
                <tr class="border-b dark:border-gray-700"><td class="py-4 px-4 font-bold">${p.namaPaket}</td><td class="text-right px-4">Rp ${parseInt(p.hargaPaket || 0).toLocaleString()}</td>
                <td class="text-center px-4"><button onclick="editPaket(${p.id})" class="text-blue-500">✏️</button> <button onclick="hapusPaket(${p.id})" class="text-red-500 ml-2">🗑️</button></td></tr>`).join('');
        }

        function formatTanggalIndo(t) {
            const d = new Date(t);
            return isNaN(d.getTime()) ? t : d.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
        }

        function updateBadge() { document.getElementById('badgeMode').innerText = isAdmin ? "MODE: ADMIN (" + currentMode + ")" : "MODE: " + currentMode; }

        function aturPilihanPaket() {
            const s = document.getElementById('inputKategori');
            s.innerHTML = dataPaket.length ? dataPaket.map(p => `<option value="${p.namaPaket}">${p.namaPaket}</option>`).join('') : '<option value="Wedding">Wedding</option>';
            autoFillHarga();
        }

        function autoFillHarga() {
            const p = dataPaket.find(x => x.namaPaket === document.getElementById('inputKategori').value);
            if(p) {
                const hargaFormatted = parseInt(p.hargaPaket || 0).toLocaleString();
                // Update input hidden harga (untuk simpan ke DB)
                document.getElementById('inputHarga').value = p.hargaPaket;
                // Update tampilan teks untuk user biasa
                document.getElementById('textHargaDisplay').innerText = "Rp " + hargaFormatted;
            }
        }

        function switchTab(t) {
            document.getElementById('section-agenda').classList.toggle('hidden', t !== 'agenda');
            document.getElementById('section-paket').classList.toggle('hidden', t !== 'paket');
            document.getElementById('tab-agenda').className = t === 'agenda' ? 'border-b-2 border-blue-600 pb-2 text-[10px] font-black uppercase tracking-widest' : 'pb-2 text-[10px] font-black uppercase tracking-widest opacity-40';
            document.getElementById('tab-paket').className = t === 'paket' ? 'border-b-2 border-blue-600 pb-2 text-[10px] font-black uppercase tracking-widest' : 'pb-2 text-[10px] font-black uppercase tracking-widest opacity-40';
        }

        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
    </script>
</body>
</html>
